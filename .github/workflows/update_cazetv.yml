name: Update Cazetv M3U

on:
  schedule:
    - cron: '*/30 * * * *'   # Every 30 minutes
  workflow_dispatch:           # Allow manual run from GitHub UI

permissions:
  contents: write              # Needed to push the updated .m3u file

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python setup ─────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── 3. Install Python dependencies ──────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install playwright playwright-stealth

      # ── 4. Install Chromium browser ─────────────────────────────────────
      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── 5. Run extractor ────────────────────────────────────────────────
      - name: Extract stream URL and update Cazetv.m3u
        run: python extract_cazetv.py
        env:
          PYTHONUNBUFFERED: "1"

      # ── 6. Commit & push if the file changed ────────────────────────────
      - name: Commit updated Cazetv.m3u
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cazetv.m3u
          if git diff --staged --quiet; then
            echo "No changes — stream URL is the same."
          else
            git commit -m "🔄 Auto-update Cazetv.m3u [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
          
