name: 🔄 Update IPTV Playlist

on:
  schedule:
    - cron: '0 * * * *'   # Every hour at :00
  workflow_dispatch:        # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install requests beautifulsoup4 lxml cloudscraper
          pip install playwright
# then separately:
run: playwright install chromium --with-deps

      - name: 🚀 Run stream extractor
        env:
          TARGET_URL: ${{ vars.TARGET_URL }}        # Set in repo → Settings → Variables
          STREAM_REFERER: ${{ vars.STREAM_REFERER }}
        run: |
          python extractstream.py

      - name: 📝 Commit & push updated playlist
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add playlist/
          if git diff --staged --quiet; then
            echo "✅ Playlist unchanged — nothing to commit"
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "🔄 Auto-update playlist [$TIMESTAMP]"
            git push
            echo "✅ Playlist pushed successfully"
          fi
          
