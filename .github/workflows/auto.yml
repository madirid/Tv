name: IPTV PRO Auto Engine

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install ffmpeg -y

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run IPTV Processor
        run: python processor.py

      - name: Run Adult Filter
        run: python filter_adult.py

      - name: Commit output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add output.m3u stats.txt ridoyiptv.m3u

          git diff --cached --quiet || (
            git commit -m "Auto update: processed + filtered playlist"
            git push
          )
